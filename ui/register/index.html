<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/ui/index.html">Trang chính</a>
        <a href="/ui/login/index.html">Đăng nhập</a>
        <a href="/ui/register/index.html" class="active">Đăng ký</a>
    </nav>
    <main class="register-page">
        <section class="register-card">
            <h1>Đăng ký tài khoản</h1>
            <p>Nhập email, username và mật khẩu để tạo tài khoản mới.</p>

            <div id="message" class="message" aria-live="polite"></div>

            <form id="register-form" autocomplete="off">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Tên người dùng" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="field">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
                </div>
                <button id="registerBtn" type="submit" class="btn">Đăng ký</button>
            </form>

            <p class="help-text">Đã có tài khoản? <a href="../login/index.html">Đăng nhập</a></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
