<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Đăng nhập</title>
</head>
<body>
    <nav class="main-nav">
        <a href="/ui/index.html">Trang chính</a>
        <a href="/ui/login/index.html" class="active">Đăng nhập</a>
        <a href="/ui/register/index.html">Đăng ký</a>
    </nav>
    <main class="login-page">
        <section class="login-card">
            <h1>Đăng nhập</h1>
            <p class="subtitle">Nhập email và mật khẩu để tiếp tục</p>

            <div id="message" class="message" aria-live="polite"></div>

            <form id="login-form" autocomplete="off">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="field">
                    <label for="password">Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button id="togglePassword" type="button" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                    </div>
                </div>

                <button id="loginBtn" type="submit" class="btn">Đăng nhập</button>
            </form>

            <p class="help-text">Chưa có tài khoản? <a href="../register/index.html">Đăng ký</a></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
