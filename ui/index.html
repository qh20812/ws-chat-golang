<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Gọi video</title>
  </head>
  <body>
    <nav class="main-nav">
      <a href="/ui/index.html" class="active">Trang chính</a>
      <a href="/ui/my-profile/index.html">Hồ sơ</a>
      <a href="/ui/list-friends/index.html">Bạn bè</a>
      <a href="/ui/login/index.html" id="navLogout">Đăng xuất</a>
    </nav>

    <main class="app-shell">
      <section class="control-panel">
        <div class="panel-head">
          <h1>Gọi video</h1>
          <p>Chọn bạn bè rồi bắt đầu cuộc gọi nhanh.</p>
        </div>

<div class="current-user" id="myIdentity">Đang tải thông tin...</div>

        <div class="field">
          <label for="friendSelect">Bạn muốn gọi</label>
          <select id="friendSelect">
            <option value="">-- Chọn bạn bè --</option>
          </select>
        </div>

        <div class="actions">
          <button id="connectBtn" class="btn">Kết nối signaling</button>
          <button id="startCameraBtn" class="btn btn-soft">Bật camera</button>
          <button id="callBtn" class="btn btn-primary">Gọi</button>
        </div>

        <section class="status-panel">
          <h2>Trạng thái</h2>
          <div class="status-grid">
            <span id="wsStatus" class="status-pill neutral">Kết nối: Chưa</span>
            <span id="cameraStatus" class="status-pill neutral">Camera: Tắt</span>
            <span id="callStatus" class="status-pill neutral">Cuộc gọi: Chưa</span>
          </div>
          <div id="eventFeed" class="event-feed"></div>
        </section>
      </section>

      <section class="video-panel">
        <div class="video-stage" id="videoStage">
          <video id="remoteVideo" autoplay playsinline></video>

          <div id="localPreview" class="local-preview">
            <div class="preview-title">You</div>
            <video id="localVideo" autoplay muted playsinline></video>
          </div>

          <button id="hangUpBtn" class="hangup-btn">Cúp máy</button>
        </div>
      </section>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
