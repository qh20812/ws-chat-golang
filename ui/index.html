<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Signal</title>
  </head>
  <body>
    <h1>Call Signaling</h1>
    <div>
      <label>My User ID:</label>
      <input id="myId" placeholder="UserID 01" type="text" />
    </div>
    <br />
    <div>
      <label>Target User ID to call:</label>
      <input id="targetId" placeholder="UserID 02" type="text" />
    </div>
    <br />
    <div>
      <button id="connectBtn">Signaling connection</button>
      <button id="startCameraBtn">Activate camera</button>
      <button id="callBtn">Start calling</button>
      <button id="hangUpBtn">Hang up the call</button>
    </div>
    <br />
    <div>
      <p>Call Signaling status</p>
      <pre id="log"></pre>
    </div>
    <br />
    <div>
      <h3>Local Video</h3>
      <video
        id="localVideo"
        autoplay
        playsinline
        muted
        width="320"
        height="240"
      ></video>
    </div>
    <br>
    <div>
      <h3>Remote Video</h3>
      <video
        id="remoteVideo"
        autoplay
        playsinline
        muted
        width="320"
        height="240"
      ></video>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
